name: Backend tests (PR)

on:
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Run backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install deps
        run: npm ci

      - name: Start backend
        env:
          PORT: 3001
        run: |
          node index.js &
          # wait up to 30s for backend to become healthy
          for i in $(seq 1 30); do
            if curl --silent --fail http://localhost:3001/ >/dev/null 2>&1; then
              echo "backend ready"
              break
            fi
            echo "waiting for backend... (${i})"
            sleep 1
          done

      - name: Run integration tests
        run: |
          npm test

      - name: Run invalid-prescription tests
        run: |
          npm run test:invalid

      - name: Stop backend
        if: always()
        run: |
          echo "stopping backend (attempt pkill)"
          pkill -f "node index.js" || true
          # also kill any process listening on port 3001
          if command -v fuser >/dev/null 2>&1; then
            fuser -k 3001/tcp || true
          else
            ss -ltnp | awk '/:3001/ { print $NF }' | awk -F'[:,]+' '{print $NF}' | xargs -r kill -9 || true
          fi
