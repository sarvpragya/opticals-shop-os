name: Lint and Security Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-audit:
    name: Lint & npm audit
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [18, 20, 22]
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Backend lint + audit
        run: |
          cd starter-backend
          npm ci
          npm run lint || echo "No backend lint script"
          npm audit --audit-level=moderate || echo "npm audit found issues or not configured"
      - name: Frontend lint + audit
        run: |
          cd starter-frontend
          npm ci
          npm run lint || echo "No frontend lint script"
          npm audit --audit-level=moderate || echo "npm audit found issues or not configured"
