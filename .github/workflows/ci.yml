name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [18, 20, 22]
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          # run Node 22 only on ubuntu to reduce redundant combos
          - node-version: 22
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Cache backend node_modules
        uses: actions/cache@v4
        with:
          path: starter-backend/node_modules
          key: backend-node-modules-${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('starter-backend/package-lock.json') }}
          restore-keys: |
            backend-node-modules-${{ runner.os }}-node-${{ matrix.node-version }}-
            backend-node-modules-${{ runner.os }}-

      - name: Warm up backend cache (install production deps)
        run: |
          cd starter-backend
          # prefer npm v7+ flag, fall back to npm ci --production
          npm ci --omit=dev || npm ci --production || true
      - name: Install backend dependencies
        run: |
          cd starter-backend
          npm ci
      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: starter-frontend/node_modules
          key: frontend-node-modules-${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('starter-frontend/package-lock.json') }}
          restore-keys: |
            frontend-node-modules-${{ runner.os }}-node-${{ matrix.node-version }}-
            frontend-node-modules-${{ runner.os }}-

      - name: Warm up frontend cache (install production deps)
        run: |
          cd starter-frontend
          npm ci --omit=dev || npm ci --production || true

      - name: Start backend
        run: |
          cd starter-backend
          PORT=3001 node index.js &
          # wait up to 30s for backend
          for i in $(seq 1 30); do
            if curl --silent --fail http://localhost:3001/ >/dev/null 2>&1; then
              echo "backend ready"
              break
            fi
            echo "waiting for backend... (${i})"
            sleep 1
          done

      - name: Run integration tests
        run: |
          cd starter-backend
          npm test

      - name: Run invalid-prescription tests
        run: |
          cd starter-backend
          npm run test:invalid

      - name: Stop backend
        if: always()
        run: |
          pkill -f "node index.js" || true
          if command -v fuser >/dev/null 2>&1; then
            fuser -k 3001/tcp || true
          else
            ss -ltnp | awk '/:3001/ { print $NF }' | awk -F'[:,]+' '{print $NF}' | xargs -r kill -9 || true
          fi

  frontend:
    name: Frontend build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [18, 20, 22]
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - node-version: 22
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install frontend dependencies
        run: |
          cd starter-frontend
          npm ci
      - name: Build frontend
        run: |
          cd starter-frontend
          npm run build || echo "No frontend build script"
