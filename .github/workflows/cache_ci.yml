name: CI Cache

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  cache-and-install:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [18, 20, 22]
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache backend node_modules
        uses: actions/cache@v4
        with:
          path: starter-backend/node_modules
          key: backend-node-modules-${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('starter-backend/package-lock.json') }}

      - name: Install backend deps
        run: |
          cd starter-backend
          npm ci

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: starter-frontend/node_modules
          key: frontend-node-modules-${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('starter-frontend/package-lock.json') }}

      - name: Install frontend deps
        run: |
          cd starter-frontend
          npm ci

      - name: Quick build checks
        run: |
          cd starter-backend
          npm test || echo "No backend tests"
          cd ../starter-frontend
          npm run build || echo "No frontend build script"
